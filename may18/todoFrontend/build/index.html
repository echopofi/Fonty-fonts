<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="../src/output.css" rel="stylesheet">
</head>
<body class="font-sans bg-[#A0F96B] text-[#1a1a1a] leading-relaxed p-5" style="background-image: url('https://images.all-free-download.com/images/graphicwebp/green_background_3_211627.webp'); background-size: cover; background-position: center; background-attachment: fixed;">
  <div id="app" class="max-w-[600px] mx-auto">

    <header class="bg-[#215B7E] text-white p-5 rounded-xl shadow-sm flex justify-between items-center mb-5">
      <h1 class="text-xl text-white">Todo App</h1>
      <div id="guest-actions" class="flex items-center gap-2.5">
        <button id="show-register-btn" class="bg-[#3A11BC] text-white border-none px-[18px] py-2 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#2E0E96]">Register</button>
        <button id="show-login-btn" class="bg-transparent text-[#A89EEF] border border-[#A89EEF] px-[18px] py-2 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#A89EEF]/10">Login</button>
      </div>
      <div id="user-actions" class="hidden items-center gap-2.5">
        <div id="avatar" class="w-9 h-9 rounded-full flex items-center justify-center text-white font-semibold text-base shrink-0"></div>
        <button id="logout-btn" class="bg-transparent text-[#E4018C] border border-[#E4018C] px-3.5 py-1.5 rounded-md text-sm cursor-pointer transition-all hover:bg-[#E4018C]/10">Logout</button>
      </div>
    </header>

    <div id="message" class="hidden"></div>

    <section id="add-todo-section" class="bg-white/90 backdrop-blur-sm p-5 rounded-xl shadow-sm mb-4">
      <h2 id="add-todo-heading" class="text-sm mb-3.5 text-[#215B7E] uppercase tracking-wide font-semibold">Add Guest Todo</h2>
      <form id="add-todo-form" class="flex flex-col gap-2.5">
        <input type="text" id="todo-title" placeholder="Todo title" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <textarea id="todo-body" placeholder="Description" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans resize-y min-h-[60px] transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20"></textarea>
        <button type="submit" id="add-todo-btn" class="bg-[#215B7E] text-white border-none px-4 py-2.5 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#1A4662] disabled:bg-gray-300 disabled:cursor-not-allowed">Add Guest Todo</button>
      </form>
    </section>

    <section id="todo-list-section" class="bg-white/90 backdrop-blur-sm p-5 rounded-xl shadow-sm mb-4">
      <h2 id="todo-list-heading" class="text-sm mb-3.5 text-[#215B7E] uppercase tracking-wide font-semibold">Guest Todos</h2>
      <div id="todo-list"></div>
    </section>

  </div>

  <!-- Register Modal -->
  <div id="register-modal" class="modal">
    <div class="modal-content bg-white p-7 pt-7 pb-6 rounded-xl w-full max-w-md relative shadow-xl">
      <button class="modal-close absolute top-3 right-4 text-2xl cursor-pointer text-[#E4018C] leading-none bg-none border-none p-1 hover:text-[#E4018C]/80" data-modal="register-modal">&times;</button>
      <h2 class="mb-4 text-lg text-[#215B7E] normal-case tracking-normal font-semibold">Create Account</h2>
      <form id="register-form" class="flex flex-col gap-2.5">
        <input type="text" id="reg-first-name" placeholder="First Name" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <input type="text" id="reg-last-name" placeholder="Last Name" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <input type="email" id="reg-email" placeholder="Email" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <input type="password" id="reg-password" placeholder="Password (min 8 characters)" minlength="8" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <button type="submit" id="register-btn" class="bg-[#215B7E] text-white border-none px-4 py-2.5 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#1A4662] disabled:bg-gray-300 disabled:cursor-not-allowed">Register</button>
      </form>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal">
    <div class="modal-content bg-white p-7 pt-7 pb-6 rounded-xl w-full max-w-md relative shadow-xl">
      <button class="modal-close absolute top-3 right-4 text-2xl cursor-pointer text-[#E4018C] leading-none bg-none border-none p-1 hover:text-[#E4018C]/80" data-modal="login-modal">&times;</button>
      <h2 class="mb-4 text-lg text-[#215B7E] normal-case tracking-normal font-semibold">Login</h2>
      <form id="login-form" class="flex flex-col gap-2.5">
        <input type="email" id="login-email" placeholder="Email" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <input type="password" id="login-password" placeholder="Password" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <button type="submit" id="login-btn" class="bg-[#215B7E] text-white border-none px-4 py-2.5 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#1A4662] disabled:bg-gray-300 disabled:cursor-not-allowed">Login</button>
      </form>
    </div>
  </div>

  <!-- Update Todo Modal -->
  <div id="update-modal" class="modal">
    <div class="modal-content bg-white p-7 pt-7 pb-6 rounded-xl w-full max-w-md relative shadow-xl">
      <button class="modal-close absolute top-3 right-4 text-2xl cursor-pointer text-[#E4018C] leading-none bg-none border-none p-1 hover:text-[#E4018C]/80" data-modal="update-modal">&times;</button>
      <h2 class="mb-4 text-lg text-[#215B7E] normal-case tracking-normal font-semibold">Update Todo</h2>
      <form id="update-form" class="flex flex-col gap-2.5">
        <input type="hidden" id="update-id">
        <input type="text" id="update-title" placeholder="Todo title" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
        <textarea id="update-body" placeholder="Description" required class="p-2.5 border border-gray-300 rounded-md text-sm font-sans resize-y min-h-[60px] transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20"></textarea>
        <select id="update-status" class="p-2.5 border border-gray-300 rounded-md text-sm font-sans transition-[border-color,box-shadow] focus:outline-none focus:border-[#3A11BC] focus:ring focus:ring-[#3A11BC]/20">
          <option value="PENDING">PENDING</option>
          <option value="COMPLETED">COMPLETED</option>
        </select>
        <button type="submit" id="update-btn" class="bg-[#215B7E] text-white border-none px-4 py-2.5 rounded-md text-sm cursor-pointer transition-colors hover:bg-[#1A4662] disabled:bg-gray-300 disabled:cursor-not-allowed">Update</button>
      </form>
    </div>
  </div>

  <script>
    // ================================================================
    //  CONFIGURATION
    // ================================================================

    const API_BASE_URL = "https://my-todo-api-9vac.onrender.com";

    const ENDPOINTS = {
      register: "/api/auth/register",
      login: "/api/auth/login",
      addTodo: "/api/todos",
      getTodos: "/api/todos",
      updateTodo: "/api/todos",
      deleteTodo: "/api/todos",
      guestTodos: "/api/guest/todos",
      health: "/api/health"
    };

    // ================================================================
    //  DOM REFERENCES
    // ================================================================

    const guestActions   = document.getElementById("guest-actions");
    const userActions    = document.getElementById("user-actions");
    const avatarEl       = document.getElementById("avatar");
    const messageEl      = document.getElementById("message");
    const addTodoHeading = document.getElementById("add-todo-heading");
    const addTodoForm    = document.getElementById("add-todo-form");
    const todoTitleInput = document.getElementById("todo-title");
    const todoBodyInput  = document.getElementById("todo-body");
    const addTodoBtn     = document.getElementById("add-todo-btn");
    const todoListHeading= document.getElementById("todo-list-heading");
    const todoList       = document.getElementById("todo-list");

    const registerModal  = document.getElementById("register-modal");
    const loginModal     = document.getElementById("login-modal");
    const updateModal    = document.getElementById("update-modal");

    const registerForm   = document.getElementById("register-form");
    const loginForm      = document.getElementById("login-form");
    const updateForm     = document.getElementById("update-form");

    // ================================================================
    //  AUTH HELPERS
    // ================================================================

    function getAuthHeaders() {
      const token = localStorage.getItem("token");
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      };
    }

    function isLoggedIn() {
      return !!localStorage.getItem("token");
    }

    function getStoredFirstName() {
      return localStorage.getItem("first_name") || null;
    }

    function setUserData(token, firstName) {
      localStorage.setItem("token", token);
      if (firstName) {
        localStorage.setItem("first_name", firstName);
      }
    }

    function clearUserData() {
      localStorage.removeItem("token");
      localStorage.removeItem("first_name");
    }

    // ================================================================
    //  MESSAGE DISPLAY
    // ================================================================

    function showMessage(text, type) {
      messageEl.textContent = text;
      var base = "p-3 rounded-lg mb-4 text-sm border ";
      if (type === "success") {
        messageEl.className = base + "bg-[#A0F96B]/30 text-green-800 border-[#A0F96B]";
      } else {
        messageEl.className = base + "bg-red-50 text-red-600 border-red-200";
      }
    }

    function hideMessage() {
      messageEl.className = "hidden";
    }

    // ================================================================
    //  MODAL CONTROLS
    // ================================================================

    function openModal(modal) {
      modal.classList.add("active");
    }

    function closeModal(modal) {
      modal.classList.remove("active");
    }

    document.querySelectorAll(".modal").forEach(function (modal) {
      modal.addEventListener("click", function (e) {
        if (e.target === modal) {
          closeModal(modal);
        }
      });
    });

    document.querySelectorAll(".modal-close").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var modalId = btn.getAttribute("data-modal");
        closeModal(document.getElementById(modalId));
      });
    });

    // ================================================================
    //  API — REGISTRATION
    // ================================================================

    async function apiRegister(formData) {
      console.log("POST " + API_BASE_URL + ENDPOINTS.register + "  — Register a new user (no token needed)");
      console.log("Request body:", formData);

      var response = await fetch(API_BASE_URL + ENDPOINTS.register, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });

      var result = await response.json();
      console.log("Register response:", result);

      if (!response.ok) {
        var errMsg = result.detail || result.message || "Registration failed";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  API — LOGIN
    // ================================================================

    async function apiLogin(credentials) {
      console.log("POST " + API_BASE_URL + ENDPOINTS.login + "  — Login with email and password (no token needed)");
      console.log("Request body:", { email: credentials.email, password: "***" });

      var response = await fetch(API_BASE_URL + ENDPOINTS.login, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(credentials)
      });

      var result = await response.json();
      console.log("Login response:", result);

      if (!response.ok) {
        var errMsg = result.detail || result.message || "Login failed";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  API — FETCH USER TODOS
    // ================================================================

    async function apiGetTodos() {
      console.log("GET " + API_BASE_URL + ENDPOINTS.getTodos + "  — Fetch authenticated user's todos (Bearer token required)");

      var response = await fetch(API_BASE_URL + ENDPOINTS.getTodos, {
        method: "GET",
        headers: getAuthHeaders()
      });

      var result = await response.json();
      console.log("GetTodos response:", result);

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("UNAUTHORIZED");
        }
        var errMsg = result.detail || result.message || "Failed to fetch todos";
        throw new Error(errMsg);
      }

      return Array.isArray(result) ? result : (result.todos || result.data || []);
    }

    // ================================================================
    //  API — ADD TODO
    // ================================================================

    async function apiAddTodo(title, body) {
      console.log("POST " + API_BASE_URL + ENDPOINTS.addTodo + "  — Create a new todo (Bearer token required)");
      console.log("Request body:", { title: title, body: body });

      var response = await fetch(API_BASE_URL + ENDPOINTS.addTodo, {
        method: "POST",
        headers: getAuthHeaders(),
        body: JSON.stringify({ title: title, body: body })
      });

      var result = await response.json();
      console.log("AddTodo response:", result);

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("UNAUTHORIZED");
        }
        var errMsg = result.detail || result.message || "Failed to add todo";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  API — UPDATE TODO
    // ================================================================

    async function apiUpdateTodo(todoId, title, body, status) {
      console.log("PUT " + API_BASE_URL + ENDPOINTS.updateTodo + "/" + todoId + "  — Update a todo (Bearer token required)");
      console.log("Request body:", { title: title, body: body, status: status });

      var response = await fetch(API_BASE_URL + ENDPOINTS.updateTodo + "/" + todoId, {
        method: "PUT",
        headers: getAuthHeaders(),
        body: JSON.stringify({ title: title, body: body, status: status })
      });

      var result = await response.json();
      console.log("UpdateTodo response:", result);

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("UNAUTHORIZED");
        }
        var errMsg = result.detail || result.message || "Failed to update todo";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  API — DELETE TODO
    // ================================================================

    async function apiDeleteTodo(todoId) {
      console.log("DELETE " + API_BASE_URL + ENDPOINTS.deleteTodo + "/" + todoId + "  — Delete a todo (Bearer token required)");

      var response = await fetch(API_BASE_URL + ENDPOINTS.deleteTodo + "/" + todoId, {
        method: "DELETE",
        headers: getAuthHeaders()
      });

      var result = await response.json();
      console.log("DeleteTodo response:", result);

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("UNAUTHORIZED");
        }
        var errMsg = result.detail || result.message || "Failed to delete todo";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  API — FETCH GUEST TODOS
    // ================================================================

    async function apiGetGuestTodos() {
      console.log("GET " + API_BASE_URL + ENDPOINTS.guestTodos + "  — Fetch guest todos (no token needed)");

      var response = await fetch(API_BASE_URL + ENDPOINTS.guestTodos, {
        method: "GET",
        headers: { "Content-Type": "application/json" }
      });

      var result = await response.json();
      console.log("GetGuestTodos response:", result);

      if (!response.ok) {
        var errMsg = result.detail || result.message || "Failed to fetch guest todos";
        throw new Error(errMsg);
      }

      return Array.isArray(result) ? result : (result.todos || result.data || []);
    }

    // ================================================================
    //  API — ADD GUEST TODO
    // ================================================================

    async function apiAddGuestTodo(title, body) {
      console.log("POST " + API_BASE_URL + ENDPOINTS.guestTodos + "  — Create a guest todo (no token needed)");
      console.log("Request body:", { title: title, body: body });

      var response = await fetch(API_BASE_URL + ENDPOINTS.guestTodos, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title, body: body })
      });

      var result = await response.json();
      console.log("AddGuestTodo response:", result);

      if (!response.ok) {
        var errMsg = result.detail || result.message || "Failed to add guest todo";
        throw new Error(errMsg);
      }

      return result;
    }

    // ================================================================
    //  UI — GENERATE AVATAR COLOR FROM NAME
    // ================================================================

    function getAvatarColor(name) {
      var colors = [
        "#3A11BC", "#E4018C", "#215B7E", "#A89EEF",
        "#FF5722", "#8BC34A", "#9C27B0", "#FF9800"
      ];
      var index = name.charCodeAt(0) % colors.length;
      return colors[index];
    }

    // ================================================================
    //  UI — RENDER GUEST VIEW
    // ================================================================

    function renderGuestView() {
      guestActions.style.display = "flex";
      userActions.style.display = "none";

      addTodoHeading.textContent = "Add Guest Todo";
      todoListHeading.textContent = "Guest Todos";
      addTodoBtn.textContent = "Add Guest Todo";
    }

    // ================================================================
    //  UI — RENDER USER VIEW (logged in)
    // ================================================================

    function renderUserView(firstName) {
      guestActions.style.display = "none";
      userActions.style.display = "flex";

      var letter = firstName ? firstName.charAt(0).toUpperCase() : "U";
      avatarEl.textContent = letter;
      avatarEl.style.backgroundColor = getAvatarColor(firstName || "U");

      addTodoHeading.textContent = "Add New Todo";
      todoListHeading.textContent = "My Todos";
      addTodoBtn.textContent = "Add Todo";
    }

    // ================================================================
    //  UI — RENDER TODO LIST
    // ================================================================

    function renderTodos(todos, isGuest) {
      todoList.innerHTML = "";

      if (!todos || todos.length === 0) {
        var empty = document.createElement("div");
        empty.className = "text-center text-gray-400 py-7 px-4 text-sm border-2 border-dashed border-gray-200 rounded-lg";
        empty.textContent = "No todos yet. Add one above!";
        todoList.appendChild(empty);
        return;
      }

      todos.forEach(function (todo) {
        var todoId = todo._id || todo.id;

        var card = document.createElement("div");
        card.className = "border border-gray-100 rounded-lg p-4 mb-2.5 transition-shadow hover:shadow-sm bg-white";

        var titleEl = document.createElement("h3");
        titleEl.className = "text-base mb-1 font-semibold text-[#215B7E]";
        titleEl.textContent = todo.title || "Untitled";
        card.appendChild(titleEl);

        var bodyEl = document.createElement("p");
        bodyEl.className = "text-gray-500 text-sm mb-2.5 whitespace-pre-wrap";
        bodyEl.textContent = todo.body || "";
        card.appendChild(bodyEl);

        var footer = document.createElement("div");
        footer.className = "flex items-center justify-between flex-wrap gap-2";

        if (todo.status) {
          var badge = document.createElement("span");
          var isCompleted = todo.status === "COMPLETED";
          badge.className = "inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase tracking-wide " + (isCompleted ? "bg-[#A0F96B] text-green-800" : "bg-[#A89EEF] text-[#3A11BC]");
          badge.textContent = todo.status;
          footer.appendChild(badge);
        } else {
          var spacer = document.createElement("span");
          footer.appendChild(spacer);
        }

        if (!isGuest) {
          var actions = document.createElement("div");
          actions.className = "flex gap-1.5";

          var editBtn = document.createElement("button");
          editBtn.className = "bg-[#A89EEF] text-white border-none px-3 py-1 rounded text-xs cursor-pointer hover:bg-[#8E7EDF] transition-colors";
          editBtn.textContent = "Edit";
          editBtn.addEventListener("click", function () {
            openUpdateModal(todoId, todo.title, todo.body, todo.status);
          });
          actions.appendChild(editBtn);

          var deleteBtn = document.createElement("button");
          deleteBtn.className = "bg-[#E4018C]/10 text-[#E4018C] border-none px-3 py-1 rounded text-xs cursor-pointer hover:bg-[#E4018C]/20 transition-colors";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", function () {
            handleDeleteTodo(todoId);
          });
          actions.appendChild(deleteBtn);

          footer.appendChild(actions);
        }

        card.appendChild(footer);
        todoList.appendChild(card);
      });
    }

    // ================================================================
    //  UI — SHOW LOADING STATE
    // ================================================================

    function showLoading() {
      todoList.innerHTML = "";
      var loading = document.createElement("div");
      loading.className = "text-center text-gray-400 py-7 px-4 text-sm";
      loading.textContent = "Loading todos...";
      todoList.appendChild(loading);
    }

    // ================================================================
    //  FLOW — LOAD GUEST TODOS
    // ================================================================

    async function loadGuestView() {
      renderGuestView();
      showLoading();

      try {
        var todos = await apiGetGuestTodos();
        renderTodos(todos, true);
      } catch (err) {
        showMessage("Failed to load guest todos: " + err.message, "error");
        renderTodos([], true);
      }
    }

    // ================================================================
    //  FLOW — LOAD USER TODOS
    // ================================================================

    async function loadUserView() {
      var firstName = getStoredFirstName() || "User";
      renderUserView(firstName);
      showLoading();

      try {
        var todos = await apiGetTodos();
        renderTodos(todos, false);
      } catch (err) {
        if (err.message === "UNAUTHORIZED") {
          showMessage("Session expired. Please login again.", "error");
          clearUserData();
          await loadGuestView();
        } else {
          showMessage("Failed to load todos: " + err.message, "error");
          renderTodos([], false);
        }
      }
    }

    // ================================================================
    //  FLOW — REFRESH TODO LIST
    // ================================================================

    async function refreshTodos() {
      if (isLoggedIn()) {
        try {
          var todos = await apiGetTodos();
          renderTodos(todos, false);
        } catch (err) {
          if (err.message === "UNAUTHORIZED") {
            showMessage("Session expired. Please login again.", "error");
            clearUserData();
            await loadGuestView();
          } else {
            showMessage("Failed to refresh todos: " + err.message, "error");
          }
        }
      } else {
        try {
          var todos = await apiGetGuestTodos();
          renderTodos(todos, true);
        } catch (err) {
          showMessage("Failed to refresh todos: " + err.message, "error");
        }
      }
    }

    // ================================================================
    //  EVENT — REGISTER FORM SUBMIT
    // ================================================================

    registerForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideMessage();

      var formData = {
        first_name: document.getElementById("reg-first-name").value.trim(),
        last_name:  document.getElementById("reg-last-name").value.trim(),
        email:      document.getElementById("reg-email").value.trim(),
        password:   document.getElementById("reg-password").value
      };

      var btn = document.getElementById("register-btn");
      btn.disabled = true;
      btn.textContent = "Registering...";

      try {
        await apiRegister(formData);
        showMessage("Registration successful! You can now log in.", "success");
        registerForm.reset();
        closeModal(registerModal);
      } catch (err) {
        showMessage("Registration failed: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Register";
      }
    });

    // ================================================================
    //  EVENT — LOGIN FORM SUBMIT
    // ================================================================

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideMessage();

      var credentials = {
        email:    document.getElementById("login-email").value.trim(),
        password: document.getElementById("login-password").value
      };

      var btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Logging in...";

      try {
        var result = await apiLogin(credentials);

        var token = result.access_token;
        if (!token) {
          throw new Error("No access_token in response");
        }

        var firstName = null;
        if (result.user) {
          firstName = result.user.first_name || result.user.firstName || null;
        }

        setUserData(token, firstName);

        showMessage("Login successful!", "success");
        loginForm.reset();
        closeModal(loginModal);

        await loadUserView();
      } catch (err) {
        showMessage("Login failed: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });

    // ================================================================
    //  EVENT — ADD TODO FORM SUBMIT
    // ================================================================

    addTodoForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideMessage();

      var title = todoTitleInput.value.trim();
      var body  = todoBodyInput.value.trim();

      if (!title || !body) {
        showMessage("Please enter both a title and description.", "error");
        return;
      }

      addTodoBtn.disabled = true;
      addTodoBtn.textContent = "Adding...";

      try {
        if (isLoggedIn()) {
          await apiAddTodo(title, body);
        } else {
          await apiAddGuestTodo(title, body);
        }

        addTodoForm.reset();
        await refreshTodos();

        showMessage("Todo added!", "success");
      } catch (err) {
        if (err.message === "UNAUTHORIZED") {
          showMessage("Session expired. Please login again.", "error");
          clearUserData();
          await loadGuestView();
        } else {
          showMessage("Failed to add todo: " + err.message, "error");
        }
      } finally {
        addTodoBtn.disabled = false;
        addTodoBtn.textContent = isLoggedIn() ? "Add Todo" : "Add Guest Todo";
      }
    });

    // ================================================================
    //  EVENT — OPEN UPDATE MODAL
    // ================================================================

    function openUpdateModal(todoId, title, body, status) {
      document.getElementById("update-id").value = todoId;
      document.getElementById("update-title").value = title || "";
      document.getElementById("update-body").value = body || "";

      var statusSelect = document.getElementById("update-status");
      statusSelect.value = status || "PENDING";

      openModal(updateModal);
    }

    // ================================================================
    //  EVENT — UPDATE FORM SUBMIT
    // ================================================================

    updateForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideMessage();

      var todoId = document.getElementById("update-id").value;
      var title  = document.getElementById("update-title").value.trim();
      var body   = document.getElementById("update-body").value.trim();
      var status = document.getElementById("update-status").value;

      if (!title || !body) {
        showMessage("Title and description are required.", "error");
        return;
      }

      var btn = document.getElementById("update-btn");
      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        await apiUpdateTodo(todoId, title, body, status);
        showMessage("Todo updated!", "success");
        closeModal(updateModal);
        await refreshTodos();
      } catch (err) {
        if (err.message === "UNAUTHORIZED") {
          showMessage("Session expired. Please login again.", "error");
          clearUserData();
          closeModal(updateModal);
          await loadGuestView();
        } else {
          showMessage("Failed to update todo: " + err.message, "error");
        }
      } finally {
        btn.disabled = false;
        btn.textContent = "Update";
      }
    });

    // ================================================================
    //  EVENT — DELETE TODO
    // ================================================================

    async function handleDeleteTodo(todoId) {
      if (!confirm("Are you sure you want to delete this todo?")) {
        return;
      }

      hideMessage();

      try {
        await apiDeleteTodo(todoId);
        showMessage("Todo deleted!", "success");
        await refreshTodos();
      } catch (err) {
        if (err.message === "UNAUTHORIZED") {
          showMessage("Session expired. Please login again.", "error");
          clearUserData();
          await loadGuestView();
        } else {
          showMessage("Failed to delete todo: " + err.message, "error");
        }
      }
    }

    // ================================================================
    //  EVENT — SHOW REGISTER MODAL
    // ================================================================

    document.getElementById("show-register-btn").addEventListener("click", function () {
      hideMessage();
      openModal(registerModal);
    });

    // ================================================================
    //  EVENT — SHOW LOGIN MODAL
    // ================================================================

    document.getElementById("show-login-btn").addEventListener("click", function () {
      hideMessage();
      openModal(loginModal);
    });

    // ================================================================
    //  EVENT — LOGOUT
    // ================================================================

    document.getElementById("logout-btn").addEventListener("click", async function () {
      clearUserData();
      showMessage("Logged out successfully.", "success");
      await loadGuestView();
    });

    // ================================================================
    //  INIT — RUN ON PAGE LOAD
    // ================================================================

    document.addEventListener("DOMContentLoaded", async function () {
      if (isLoggedIn()) {
        await loadUserView();
      } else {
        await loadGuestView();
      }
    });
  </script>
</body>
</html>
